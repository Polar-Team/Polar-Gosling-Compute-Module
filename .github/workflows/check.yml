name: Check

on:
  pull_request:
  workflow_dispatch:

jobs:
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: latest

      - name: Install tflint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Install terraform-docs
        run: |
          curl -sSLo terraform-docs.tar.gz https://github.com/terraform-docs/terraform-docs/releases/download/v0.19.0/terraform-docs-v0.19.0-linux-amd64.tar.gz
          tar -xzf terraform-docs.tar.gz
          chmod +x terraform-docs
          sudo mv terraform-docs /usr/local/bin/terraform-docs
          rm -f terraform-docs.tar.gz

      - name: Install checkov and pre-commit
        run: pip install checkov pre-commit --break-system-packages

      - name: Generate .pre-commit-config.yaml
        run: |
          cat > .pre-commit-config.yaml << 'EOF'
          repos:
          - repo: https://github.com/tofuutils/pre-commit-opentofu
            rev: v2.2.2
            hooks:
              - id: tofu_fmt
                exclude: '(\.github/|tests/)'
              - id: tofu_validate
                exclude: '(\.github/|tests/)'
                args:
                  - --tf-init-args=-upgrade
              - id: tofu_checkov
                args:
                  - --args=--skip-check CKV_AWS_41
                  - --args=--skip-check CKV_AWS_65
                  - --args=--skip-check CKV_AWS_88
                  - --args=--skip-check CKV_AWS_224
                  - --args=--skip-check CKV_AWS_249
                  - --args=--skip-check CKV2_GHA_1
              - id: tofu_tflint
                exclude: '(\.github/|tests/)'
                args:
                  - --args=--enable-rule=terraform_deprecated_interpolation
                  - --args=--enable-rule=terraform_deprecated_index
                  - --args=--enable-rule=terraform_empty_list_equality
                  - --args=--enable-rule=terraform_module_pinned_source
                  - --args=--enable-rule=terraform_module_version
                  - --args=--enable-rule=terraform_required_providers
                  - --args=--enable-rule=terraform_required_version
                  - --args=--enable-rule=terraform_typed_variables
                  - --args=--enable-rule=terraform_unused_declarations
                  - --args=--enable-rule=terraform_unused_required_providers
                  - --args=--enable-rule=terraform_workspace_remote
              - id: tofu_docs
                exclude: '(\.github/|tests/)'
                args:
                  - --hook-config=--path-to-file=README.md
                  - --hook-config=--add-to-existing-file=true
                  - --hook-config=--create-file-if-not-exist=true
          EOF

      - name: Run pre-commit
        run: |
          rm -rf tests && TF_CLI_CONFIG_FILE="./terraform.rc" tofu init -upgrade && \
          pre-commit run -a

  test-validation:
    name: Tests / Validation (mock)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: latest

      - name: tofu init
        working-directory: tests/tests_validation
        run: tofu init -upgrade

      - name: tofu test
        working-directory: tests/tests_validation
        run: TF_CLI_CONFIG_FILE="./terraform.rc" tofu test -verbose

  test-aws:
    name: Tests / AWS
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      YC_CLOUD_ID: ${{ secrets.YC_CLOUD_ID }}
      YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
    strategy:
      fail-fast: false
      matrix:
        suite:
          - tests_aws_ecs_base
          - tests_aws_vm_base
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          role-session-name: githubcissession
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Configure Yandex Cloud credentials (OIDC)
        id: yc-auth
        uses: docker://ghcr.io/yc-actions/yc-iam-token-fed:1.0.0
        with:
          yc-sa-id: ${{ secrets.YC_SA_ID }}

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: latest

      - name: tofu init
        working-directory: tests/${{ matrix.suite }}
        env:
          YC_TOKEN: ${{ steps.yc-auth.outputs.token }}
        run: tofu init -upgrade

      - name: tofu test
        working-directory: tests/${{ matrix.suite }}
        env:
          YC_TOKEN: ${{ steps.yc-auth.outputs.token }}
        run: TF_CLI_CONFIG_FILE="./terraform.rc" tofu test -verbose

  test-yc:
    name: Tests / Yandex Cloud
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      YC_CLOUD_ID: ${{ secrets.YC_CLOUD_ID }}
      YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
    strategy:
      fail-fast: false
      matrix:
        suite:
          - tests_yc_vm_base
          - tests_yc_serverless_base
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          role-session-name: githubcissession
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Configure Yandex Cloud credentials (OIDC)
        id: yc-auth
        uses: docker://ghcr.io/yc-actions/yc-iam-token-fed:1.0.0
        with:
          yc-sa-id: ${{ secrets.YC_SA_ID }}

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: latest

      - name: tofu init
        working-directory: tests/${{ matrix.suite }}
        env:
          YC_TOKEN: ${{ steps.yc-auth.outputs.token }}
          TF_VAR_yc_folder_id: ${{ env.YC_FOLDER_ID }}
        run: tofu init -upgrade

      - name: tofu test
        working-directory: tests/${{ matrix.suite }}
        env:
          YC_TOKEN: ${{ steps.yc-auth.outputs.token }}
          TF_VAR_yc_folder_id: ${{ env.YC_FOLDER_ID }}
        run: TF_CLI_CONFIG_FILE="./terraform.rc" tofu test -verbose
